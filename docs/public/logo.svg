  <rect x="36" y="36" width="400" height="400" rx="24" ry="24" fill="#3499cc" stroke="#2a7faa" stroke-width="1.5"/>
  <rect x="16" y="16" width="400" height="400" rx="24" ry="24" fill="#4cbd94" stroke="#3a9e7a" stroke-width="1.5"/>

  <!-- Terminal ">" chevron -->
  <path d="M100 138 L216 216 L100 294" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

