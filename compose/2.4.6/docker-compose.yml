services:
  php:
    image: mappia/magento-php:devcontainer8.2
    environment:
      - PHP_IDE_CONFIG=serverName=magento
      - "PHP_SENDMAIL_PATH=/usr/local/bin/mailpit sendmail -t --smtp-addr mailpit:1025"
      - PHP_MAIL_ADD_X_HEADER=On
      - PHP_MAIL_MIXED_LF_AND_CRLF=Off
      - CONFIG__DEFAULT__CATALOG__SEARCH__OPENSEARCH_SERVER_HOSTNAME=opensearch
      - CONFIG__DEFAULT__CATALOG__SEARCH__ENGINE=opensearch
      - CONFIG__DEFAULT__CATALOG__SEARCH__OPENSEARCH_SERVER_PORT=9200
    networks:
      - magento
    depends_on:
      - db
      - opensearch
      - rabbitmq
      - redis
      - mailpit
    volumes:
      - ../../bin/configure-sendmail.sh:/usr/local/bin/configure-sendmail.sh:ro
    command: /bin/sh -c "/usr/local/bin/configure-sendmail.sh && php-fpm"

  nginx:
    image: nginx:1.28
    environment:
      - MAGENTO2_UPSTREAM=php
      - MAGENTO2_UPSTREAM_PORT=9000
      - NGINX_PORT=8000
      - NGINX_TLS_PORT=8443
      - MAGENTO_TLS_CERT=snakeoil.crt
      - MAGENTO_TLS_KEY=snakeoil.key
    ports:
      - "80:8000"
      - "443:8443"
    networks:
      - magento
    depends_on:
      - php

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: magento
      MYSQL_DATABASE: magento
      MYSQL_USER: magento
      MYSQL_PASSWORD: magento
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - magento
    command: --max_allowed_packet=256M  --tls-version= --log-bin-trust-function-creators=1

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=TH65Fda4IIZoNVSAF6R0lgP&
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - magento

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: magento
      RABBITMQ_DEFAULT_PASS: magento
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - magento

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - magento
    command: redis-server --appendonly yes

  mailpit:
    image: axllent/mailpit:v1.29.0
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - magento

volumes:
  db_data:
  opensearch_data:
  rabbitmq_data:
  redis_data:

networks:
  magento:
    driver: bridge